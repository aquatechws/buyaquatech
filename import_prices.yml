name: Sync Prices to Firebase

# Runs automatically whenever prices.xlsx is pushed to the main branch
on:
  push:
    branches: [main]
    paths:
      - 'prices.xlsx'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl firebase-admin

      - name: Sync prices to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python import_prices.py
